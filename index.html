<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px;
    user-select: none;
  }

  /* ── Name-Eingabe ── */
  #name-screen {
    margin-top: 120px;
    text-align: center;
    font-size: 14px;
  }
  #name-screen h2 {
    font-size: 16px;
    font-weight: normal;
    margin-bottom: 16px;
    color: #fff;
  }
  #name-input {
    background: #000;
    border: 1px solid #fff;
    color: #fff;
    font-family: monospace;
    font-size: 14px;
    padding: 4px 8px;
    width: 160px;
    outline: none;
  }
  #name-btn {
    background: #fff;
    color: #000;
    border: none;
    font-family: monospace;
    font-size: 14px;
    padding: 5px 12px;
    cursor: pointer;
    margin-left: 6px;
  }
  #name-error {
    color: #f55;
    font-size: 12px;
    margin-top: 6px;
    min-height: 14px;
  }
  #name-hint {
    font-size: 11px;
    color: #444;
    margin-top: 20px;
  }

  /* ── Game ── */
  #game-screen {
    display: none;
    flex-direction: column;
    align-items: flex-start;
  }

  #hud {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
    display: flex;
    gap: 20px;
    width: 540px;
    justify-content: space-between;
  }

  canvas {
    display: block;
    outline: 1px solid #222;
    image-rendering: pixelated;
    position: relative;
  }

  #canvas-wrap {
    position: relative;
    width: 540px;
    height: 540px;
  }

  /* ── Leaderboard ── */
  #leaderboard {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #000;
    border: 1px solid #444;
    padding: 16px 24px;
    min-width: 220px;
    z-index: 10;
  }
  #lb-title {
    font-size: 16px;
    margin-bottom: 12px;
    text-align: center;
  }
  #lb-body td {
    padding: 2px 10px 2px 0;
    font-size: 13px;
  }
  #lb-footer {
    font-size: 11px;
    color: #444;
    text-align: center;
    margin-top: 10px;
  }

  #msg {
    font-size: 13px;
    margin-top: 6px;
    min-height: 16px;
    color: #aaa;
  }

  #waiting {
    font-size: 12px;
    color: #444;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- Name-Eingabe -->
<div id="name-screen">
  <h2>Snake</h2>
  <div>
    <input id="name-input" type="text" maxlength="15" placeholder="Dein Name" autocomplete="off">
    <button id="name-btn">Spielen</button>
  </div>
  <div id="name-error"></div>
  <div id="name-hint">Pfeiltasten · WASD &nbsp;·&nbsp; max. 15 Zeichen</div>
</div>

<!-- Spiel -->
<div id="game-screen">
  <div id="hud">
    <span id="hud-players">–</span>
    <span id="hud-scores"></span>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas" width="540" height="540"></canvas>

    <!-- Leaderboard (über Canvas) -->
    <div id="leaderboard">
      <div id="lb-title"></div>
      <table><tbody id="lb-body"></tbody></table>
      <div id="lb-footer">Nächste Runde startet...</div>
    </div>
  </div>

  <div id="msg"></div>
  <div id="waiting">Verbinde...</div>
</div>

<script> const WS_PORT = 8765; </script>
<script src="game.js"></script>
</body>
</html>
